name: iSportsman Occupancy Logger

on:
  schedule:
    # Candidate UTC times for 12:00 and 16:00 America/New_York.
    # The schedule gate below handles daylight saving time.
    - cron: "0 16,17,20,21 * * *"
  workflow_dispatch: {}

permissions:
  contents: write  # needed for gh-pages deployment

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Check target run time
        id: schedule_gate
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          python - <<'PY'
          import os
          from datetime import datetime
          from zoneinfo import ZoneInfo

          now = datetime.now(ZoneInfo("America/New_York"))
          manual = os.environ["EVENT_NAME"] == "workflow_dispatch"
          should_run = manual or now.hour in (12, 16)

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              out.write(f"should_run={str(should_run).lower()}\n")
              out.write(f"local_time={now:%Y-%m-%d %H:%M:%S %Z}\n")

          print(f"Local time: {now:%Y-%m-%d %H:%M:%S %Z}")
          print(f"Manual run: {manual}")
          print(f"Should run: {should_run}")
          PY

      - name: Install Python dependencies
        if: steps.schedule_gate.outputs.should_run == 'true'
        run: pip install -r requirements.txt

      - name: Install Playwright Chromium
        if: steps.schedule_gate.outputs.should_run == 'true'
        run: python -m playwright install --with-deps chromium

      - name: Scrape iSportsman -> Google Sheet
        id: scrape
        if: steps.schedule_gate.outputs.should_run == 'true'
        env:
          SHEET_ID: ${{ secrets.SHEET_ID }}
          GOOGLE_SA_JSON: ${{ secrets.GOOGLE_SA_JSON }}
          SHEET_TAB_NAME: "OccupancyLog"
        run: python scrape_isportsman.py

      - name: Upload scraper debug artifacts
        if: failure() && steps.schedule_gate.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: scraper-debug-${{ github.run_id }}
          path: artifacts/
          if-no-files-found: ignore
          retention-days: 14

      - name: Build dashboard HTML
        if: steps.schedule_gate.outputs.should_run == 'true'
        env:
          SHEET_ID: ${{ secrets.SHEET_ID }}
          GOOGLE_SA_JSON: ${{ secrets.GOOGLE_SA_JSON }}
          SHEET_TAB_NAME: "OccupancyLog"
        run: python build_dashboard.py

      - name: Publish to GitHub Pages
        if: steps.schedule_gate.outputs.should_run == 'true'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
